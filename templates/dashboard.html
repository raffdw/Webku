{% extends "base.html" %}

{% block content %}

<h2>Welcome, {{ username }} 👋</h2>

<div style="display:flex; gap:20px; margin-top:20px; flex-wrap:wrap;">

    <!-- CARD GAME -->
    <div style="background:white; padding:20px; border-radius:10px; width:250px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
        <h3>🎮 Games</h3>
        <p>Mainkan berbagai mini game seru!</p>
        <a href="/games" style="text-decoration:none; color:white; background:#3498db; padding:8px 12px; border-radius:5px;">Buka Game</a>
    </div>

    <!-- CARD PROFILE -->
    <div style="background:white; padding:20px; border-radius:10px; width:250px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
        <h3>👤 Profile</h3>
        <p>Kelola akun kamu</p>
        <button disabled style="padding:8px 12px;">Coming Soon</button>
    </div>

    <!-- CARD STATS -->
    <div style="background:white; padding:20px; border-radius:10px; width:250px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
        <h3>📊 Statistik</h3>
        <p>Lihat progress permainan</p>
        <button disabled style="padding:8px 12px;">Coming Soon</button>
    </div>

</div>

{% endblock %}
