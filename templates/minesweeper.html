{% extends "base.html" %}

{% block content %}

<h2>Minesweeper</h2>

<button onclick="startGame()">🔄 New Game</button>

<div id="game"></div>

<script>
let size = 8;
let mines = 10;
let board = [];

function startGame() {
    board = [];
    
    for (let r = 0; r < size; r++) {
        board[r] = [];
        for (let c = 0; c < size; c++) {
            board[r][c] = {
                mine: false,
                revealed: false,
                count: 0
            };
        }
    }

    // PLACE MINES
    let placed = 0;
    while (placed < mines) {
        let r = Math.floor(Math.random() * size);
        let c = Math.floor(Math.random() * size);

        if (!board[r][c].mine) {
            board[r][c].mine = true;
            placed++;
        }
    }

    // COUNT NUMBERS
    for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {

            if (board[r][c].mine) continue;

            let count = 0;

            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    let nr = r + dr;
                    let nc = c + dc;

                    if (
                        nr >= 0 && nr < size &&
                        nc >= 0 && nc < size &&
                        board[nr][nc].mine
                    ) {
                        count++;
                    }
                }
            }

            board[r][c].count = count;
        }
    }

    render();
}

function render() {
    let html = "<table style='border-collapse:collapse;'>";

    for (let r = 0; r < size; r++) {
        html += "<tr>";
        for (let c = 0; c < size; c++) {

            let cell = board[r][c];
            let display = "";

            if (cell.revealed) {
                if (cell.mine) display = "💣";
                else if (cell.count > 0) display = cell.count;
            }

            html += `
            <td onclick="clickCell(${r},${c})"
            style="
            width:40px;
            height:40px;
            text-align:center;
            border:1px solid #999;
            background:${cell.revealed ? '#ecf0f1' : '#bdc3c7'};
            cursor:pointer;
            ">
            ${display}
            </td>`;
        }
        html += "</tr>";
    }

    html += "</table>";
    document.getElementById("game").innerHTML = html;
}

function clickCell(r, c) {
    let cell = board[r][c];

    if (cell.revealed) return;

    cell.revealed = true;

    if (cell.mine) {
        alert("💥 Game Over!");
        startGame();
        return;
    }

    if (cell.count === 0) {
        revealAround(r, c);
    }

    render();
    checkWin();
}

function revealAround(r, c) {
    for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {

            let nr = r + dr;
            let nc = c + dc;

            if (
                nr >= 0 && nr < size &&
                nc >= 0 && nc < size &&
                !board[nr][nc].revealed
            ) {
                board[nr][nc].revealed = true;

                if (board[nr][nc].count === 0 && !board[nr][nc].mine) {
                    revealAround(nr, nc);
                }
            }
        }
    }
}

function checkWin() {
    let safeCells = size * size - mines;
    let revealed = 0;

    for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
            if (board[r][c].revealed && !board[r][c].mine) {
                revealed++;
            }
        }
    }

    if (revealed === safeCells) {
        alert("🎉 You Win!");
        startGame();
    }
}

startGame();
</script>

{% endblock %}
